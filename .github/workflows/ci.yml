# The name of the workflow as it appears in the GitHub Actions tab
name: CI Pipeline

# 1. Define the triggers (events)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Define the jobs to run
jobs:
  build-and-test:
    # The type of runner the job will run on
    runs-on: ubuntu-latest

    # 3. Define the sequence of tasks (steps)
    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up a language environment (Example: Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run tests or build scripts
      - name: Run tests
        run: npm test
